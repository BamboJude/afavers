name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Type-check ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tsc
        working-directory: client
        run: npx tsc -b --noEmit

  # ─── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Vitest unit tests (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=client

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Vite production build (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=client
        env:
          # Provide placeholder values so the Supabase client initialisation
          # warning does not cause a non-zero exit code.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

  # ─── Supabase Functions type-check (Deno) ───────────────────────────────────
  deno-typecheck:
    name: Deno type-check (supabase/functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check supabase functions
        run: |
          deno check \
            supabase/functions/_shared/cors.ts \
            supabase/functions/_shared/jobs.ts \
            supabase/functions/_shared/language.ts \
            supabase/functions/fetch-jobs/index.ts \
            supabase/functions/news/index.ts \
            supabase/functions/werkstudent-search/index.ts
